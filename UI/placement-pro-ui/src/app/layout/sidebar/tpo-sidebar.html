<!-- TPO Sidebar Navigation Template
     Role: Displays TPO admin navigation with institute info and collapsible menus
     Accessibility: Includes ARIA labels, semantic HTML, and keyboard navigation support
-->

<nav class="sidebar" role="navigation" aria-label="TPO admin navigation">
  
  <!-- Institute/Organization Header -->
  <div class="sidebar-header">
    <div class="institute-badge" aria-label="Institute initial">S</div>
    <div class="institute-info">
      <div class="institute-name">SICSR</div>
      <div class="institute-sub">PlacementPro</div>
    </div>
  </div>

  <!-- Navigation Label -->
  <div class="nav-label">Main Menu</div>

  <!-- Main Menu -->
  <ul class="menu" role="menubar">
    
    <!-- Dashboard -->
    <li class="menu-item" 
        routerLink="/dashboard" 
        routerLinkActive="active" 
        [routerLinkActiveOptions]="{ exact: true }"
        role="menuitem"
        aria-label="Go to Dashboard">
      <div class="menu-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
      </div>
      <span>Dashboard</span>
    </li>

        <li class="menu-item"
        routerLink="/off-campus"
        routerLinkActive="active"
        role="menuitem"
        aria-label="Browse Off Campus Opportunities">
      <div class="menu-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <span>Off Campus Feed</span>
    </li>

    <!-- Student Onboarding -->
    <li class="menu-item" 
        routerLink="/student-onboarding" 
        routerLinkActive="active"
        role="menuitem"
        aria-label="Manage student onboarding">
      <div class="menu-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </div>
      <span>Student Onboarding</span>
    </li>

    <!-- Students Master Data -->
    <li class="menu-item" 
        routerLink="/students" 
        routerLinkActive="active"
        role="menuitem"
        aria-label="View Students Master Data">
      <div class="menu-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </div>
      <span>Students Master Data</span>
    </li>

    <!-- Placement Drives (Collapsible) -->
    <li class="menu-item parent" 
        (click)="toggleDrives()" 
        [class.open]="drivesExpanded"
        role="menuitem"
        [attr.aria-expanded]="drivesExpanded"
        aria-controls="drives-submenu"
        aria-label="Toggle Placement Drives menu">
      <div class="menu-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="7" width="20" height="14" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
        </svg>
      </div>
      <span>Placement Drives</span>
      <div class="chevron" [class.rotated]="drivesExpanded" aria-hidden="true">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </li>

    <!-- Placement Drives Submenu -->
    <div class="submenu" 
         [class.expanded]="drivesExpanded"
         id="drives-submenu"
         role="menu">
      
      <!-- Publish New Drive -->
      <li class="submenu-item" 
          routerLink="/placement-drives/create-drive" 
          routerLinkActive="active"
          role="menuitem"
          aria-label="Publish new placement drive">
        <div class="submenu-dot" aria-hidden="true"></div>
        Publish New Drive
      </li>

      <!-- Current Open Applications -->
      <li class="submenu-item" 
          routerLink="/placement-drives/open-drives" 
          routerLinkActive="active"
          role="menuitem"
          aria-label="View current open applications">
        <div class="submenu-dot" aria-hidden="true"></div>
        Current Open Applications
      </li>

      <!-- Closed Applications -->
      <li class="submenu-item" 
          routerLink="/placement-drives/closed-drives" 
          routerLinkActive="active"
          role="menuitem"
          aria-label="View closed applications">
        <div class="submenu-dot" aria-hidden="true"></div>
        Closed Applications
      </li>

    </div>

    <!-- Mock Tests -->
    <li class="menu-item"
        [class.active]="isActive('/mock-tests')"
        (click)="navigate('/mock-tests')"
        role="menuitem"
        aria-label="Manage mock tests">
      <div class="menu-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </div>
      <span>Mock Tests</span>
    </li>

    <!-- ✅ NEW: Bulk Email Campaigns -->
    <li class="menu-item"
        routerLink="/tpo/bulk-email"
        routerLinkActive="active"
        role="menuitem"
        aria-label="Send bulk emails to recruiters">
      <div class="menu-icon" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1"/>
          <path d="M12 1v6m11 5h-6M1 12h6m11-11v6"/>
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <path d="M3 8h18m-18 4h18"/>
        </svg>
      </div>
      <span>Bulk Email Recruiters</span>
    </li>

  </ul>

  <!-- Sidebar Footer with Logout -->
  <div class="sidebar-footer">
    <button class="logout-btn" 
            (click)="logout()"
            aria-label="Logout from PlacementPro">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" 
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>

</nav>

<nav class="sidebar" role="navigation" aria-label="Student navigation">
  <div class="sidebar-scroll">
    <section class="menu-group" aria-label="Overview navigation">
      <div class="nav-label">Overview</div>
      <ul class="menu" role="menubar">
        <li class="menu-item"
            routerLink="/dashboard"
            routerLinkActive="active"
            [routerLinkActiveOptions]="{ exact: true }"
            role="menuitem"
            aria-label="Go to Dashboard">
          <div class="menu-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
          </div>
          <span>Dashboard</span>
        </li>
      </ul>
    </section>

    <section class="menu-group" aria-label="Placement navigation">
      <div class="nav-label">Placement</div>
      <ul class="menu" role="menubar">
        <li class="menu-item"
            routerLink="/drives"
            routerLinkActive="active"
            role="menuitem"
            aria-label="View Eligible Drives">
          <div class="menu-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            </svg>
          </div>
          <span>Eligible Drives</span>
          <div class="badge" *ngIf="eligibleCount > 0" aria-label="Available drives count">
            {{ eligibleCount }}
          </div>
        </li>

        <li class="menu-item"
            routerLink="/applications"
            routerLinkActive="active"
            role="menuitem"
            aria-label="View My Applications">
          <div class="menu-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <span>My Applications</span>
        </li>

        <li class="menu-item"
            routerLink="/my-progress"
            routerLinkActive="active"
            role="menuitem"
            aria-label="View Placement Progress">
          <div class="menu-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18"/>
              <path d="M7 15l3-3 3 2 5-7"/>
            </svg>
          </div>
          <span>Placement Progress</span>
        </li>
      </ul>
    </section>

    <section class="menu-group" aria-label="Preparation navigation">
      <div class="nav-label">Preparation</div>
      <ul class="menu" role="menubar">
        <li class="menu-item"
            [class.active]="isActive('/tests')"
            (click)="navigate('/tests')"
            role="menuitem"
            aria-label="Access mock tests">
          <div class="menu-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
          <span>Mock Tests</span>
        </li>

        <li class="menu-item"
            routerLink="/resume-builder"
            routerLinkActive="active"
            role="menuitem"
            aria-label="Open Resume Generator">
          <div class="menu-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
          </div>
          <span>Resume Generator</span>
        </li>
      </ul>
    </section>

    <section class="menu-group" aria-label="Account navigation">
      <div class="nav-label">Account</div>
      <ul class="menu" role="menubar">
        <li class="menu-item"
            routerLink="/profile"
            routerLinkActive="active"
            role="menuitem"
            aria-label="View My Profile">
          <div class="menu-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span>My Profile</span>
        </li>
      </ul>
    </section>

    <div class="placement-status"
         [ngClass]="{ 'ps-placed': placementStatus === 'PLACED', 'ps-seeking': placementStatus === 'SEEKING' }"
         role="status"
         [attr.aria-label]="placementStatus === 'PLACED' ? 'You are placed' : 'You are seeking placement'">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" aria-hidden="true">
        <circle cx="12" cy="8" r="7"/>
        <polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/>
      </svg>
      <span>{{ placementStatus === 'PLACED' ? 'Placed' : 'Seeking Placement' }}</span>
    </div>
  </div>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()" aria-label="Logout from application">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</nav>
